name: Build of UBI 9 based Developer Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY || 'quay.io/devfile' }}

jobs:
  build-base-image:
    name: Build base image
    strategy:
      fail-fast: false
      matrix:
        runners: ['ubuntu-22.04']
        arch: ['amd64', 'arm64', 'ppc64le']
    runs-on: ${{ matrix.runners }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set arch environment variable
        run: echo "arch=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Set short_sha environment variable
        run: echo short_sha="$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Free runner space
        run: sudo rm -rf /usr/local/lib/android

      - name: Cleanup docker images
        run: docker system prune -af

      # Setup QEMU for cross-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Setup Docker Buildx with container driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64,linux/ppc64le

      - name: Build base image (multi-arch, local only)
        run: |
          cd base/ubi9
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/ppc64le \
            --progress=plain \
            -t ${{ env.REGISTRY }}/base-developer-image:${{ env.arch }}-${{ env.short_sha }} .
